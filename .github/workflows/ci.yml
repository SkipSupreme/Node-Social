name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nodesocial
          POSTGRES_PASSWORD: nodesocialpwd
          POSTGRES_DB: nodesocial_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'
          cache-dependency-path: |
            backend/api/package-lock.json
            app/package-lock.json
      
      - name: Install backend dependencies
        run: |
          cd backend/api
          npm ci
      
      - name: Install app dependencies
        run: |
          cd app
          npm ci
      
      - name: Type check backend
        run: |
          cd backend/api
          npx tsc --noEmit
      
      - name: Type check app
        run: |
          cd app
          npx tsc --noEmit
      
      - name: Format Prisma schema
        run: |
          cd backend/api
          npx prisma format --schema=prisma/schema.prisma
      
      - name: Validate Prisma schema
        run: |
          cd backend/api
          npx prisma validate
        env:
          DATABASE_URL: postgresql://nodesocial:nodesocialpwd@localhost:5432/nodesocial_test?schema=public
      
      - name: Test Docker health
        run: |
          # Verify services are accessible
          pg_isready -h localhost -p 5432 || exit 1
          redis-cli -h localhost -p 6379 ping || exit 1

      - name: Generate Prisma client
        run: |
          cd backend/api
          npx prisma generate
        env:
          DATABASE_URL: postgresql://nodesocial:nodesocialpwd@localhost:5432/nodesocial_test?schema=public

      - name: Run database migrations
        run: |
          cd backend/api
          npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://nodesocial:nodesocialpwd@localhost:5432/nodesocial_test?schema=public

      - name: Start backend and test health
        run: |
          cd backend/api
          # Start the server in background
          NODE_ENV=test npm run dev &
          SERVER_PID=$!

          # Wait for server to start
          sleep 10

          # Test health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Health check failed with status $HTTP_STATUS"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          # Stop server
          kill $SERVER_PID 2>/dev/null || true
        env:
          DATABASE_URL: postgresql://nodesocial:nodesocialpwd@localhost:5432/nodesocial_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          CSRF_SECRET: test-csrf-secret-for-ci
          NODE_ENV: test
          PORT: 3000

      - name: Run backend tests
        run: |
          cd backend/api
          npm test
        env:
          DATABASE_URL: postgresql://nodesocial:nodesocialpwd@localhost:5432/nodesocial_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          CSRF_SECRET: test-csrf-secret-for-ci
          NODE_ENV: test

